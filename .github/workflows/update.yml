name: Update Helium

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Check and update Helium version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for new release and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(curl -s https://api.github.com/repos/imputnet/helium-linux/releases/latest | jq -r '.tag_name')
          CURRENT=$(grep 'version = ' flake.nix | head -1 | grep -oP '"[^"]+"' | tr -d '"')

          echo "Current: $CURRENT  Latest: $LATEST"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already up to date."
            exit 0
          fi

          URL="https://github.com/imputnet/helium-linux/releases/download/${LATEST}/helium-${LATEST}-x86_64.AppImage"
          RAW=$(nix-prefetch-url --type sha256 "$URL")
          SHA256=$(nix hash to-sri --type sha256 "$RAW")

          sed -i "s|version = \"${CURRENT}\"|version = \"${LATEST}\"|" flake.nix
          sed -i "s|sha256 = \"sha256-[^\"]*\"|sha256 = \"${SHA256}\"|" flake.nix

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "update/helium-${LATEST}"
          git add flake.nix
          git commit -m "chore: bump helium to ${LATEST}"
          git push origin "update/helium-${LATEST}"

          gh pr create \
            --title "chore: bump helium to ${LATEST}" \
            --body "Automated update from \`${CURRENT}\` to \`${LATEST}\`." \
            --base main \
            --head "update/helium-${LATEST}"
